# MultiDeck tmux config snippet
#
# Append to ~/.tmux.conf to get the persona-spawn keybinding:
#   cat /mnt/f/03-INFRASTRUCTURE/dispatch-framework/scripts/multideck.tmux.conf >> ~/.tmux.conf
#   tmux source-file ~/.tmux.conf   # reload without restart
#
# Adds:
#   Ctrl+Shift+P   → popup menu of personas; pick one, lands as new tiled pane
#                    (no tmux prefix needed — global hotkey)
#
# IMPORTANT: Windows Terminal binds Ctrl+Shift+P to its Command Palette by
# default. Free it by adding to %LOCALAPPDATA%\Packages\Microsoft.WindowsTerminal_*\LocalState\settings.json:
#   {
#     "actions": [
#       { "command": "unbound", "keys": "ctrl+shift+p" }
#     ]
#   }
# Or rebind wt's palette to a different combo (Ctrl+Shift+; is unused).

# Enable xterm extended-keys so tmux can distinguish Ctrl+Shift+P from Ctrl+P
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Global (no-prefix) hotkey for persona spawn menu
bind-key -n C-S-p run-shell "/mnt/f/03-INFRASTRUCTURE/dispatch-framework/scripts/spawn-persona-menu.sh"

# ------------------------------------------------------------------------
# Cyberpunk styling — palette pulled from dashboard/launcher.html
#   --neon-cyan  #00FFCC   primary accent (Dispatch)
#   --neon-pink  #FF00AA   secondary accent
#   --bg         #0a0014   deep space background
#   --bg-grid    #1a0033   grid line / inactive accent
#   --text       #c0e0ff   foreground readable
#   --text-dim   #607090   inactive / dim
# Persona accents from personas.json:
#   #D946EF (persona-author magenta), #8B5CF6 (voice-tech violet)
# ------------------------------------------------------------------------

# True-color terminal — required for 24-bit hex codes below
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"

# Status bar — black field, teal MULTIDECK label, dim host/time on the right
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#0a0014,fg=#607090"
set -g status-left-length 40
set -g status-right-length 80
# Status-left uses time-of-day accent (multideck-status-color.sh emits hex
# per-hour: morning teal, afternoon amber, evening magenta, late blue).
set -g status-left  "#[fg=##{?#{e|>:#{e|t:#(date +%H)},5},#(/mnt/f/03-INFRASTRUCTURE/dispatch-framework/scripts/multideck-status-color.sh),00FFCC},bold] MULTIDECK #[fg=#1a0033]▎#[fg=#c0e0ff,nobold] #S #[fg=#607090](#{window_panes}p#{?session_attached, *#{session_attached},}) "
# Right side: live system metrics (Kokoro queue depth, pending Redline reviews)
# from multideck-status.sh, then host, then time-of-day-tinted clock.
set -g status-right "#(/mnt/f/03-INFRASTRUCTURE/dispatch-framework/scripts/multideck-status.sh)#[fg=#1a0033]▎#[fg=#607090] #H #[fg=#1a0033]▎#[fg=##(/mnt/f/03-INFRASTRUCTURE/dispatch-framework/scripts/multideck-status-color.sh)] %H:%M #[fg=#607090]%Y-%m-%d "

# Window list — dim for inactive, magenta for current
setw -g window-status-format         "#[fg=#607090] #I #[fg=#607090]#W "
setw -g window-status-current-format "#[fg=#0a0014,bg=#D946EF,bold] #I #[fg=#FF00AA,bg=#0a0014,nobold] #W "
setw -g window-status-separator      ""

# Pane borders — bright magenta when focused, deep grey otherwise
set -g pane-border-style        "fg=#222222"
set -g pane-active-border-style "fg=#D946EF,bold"

# Per-pane title strip on top with richer info: callsign (already in title) +
# current command + uptime since pane creation. The pane title carries the
# embedded color escape from launch-persona-tmux.sh; the appended fragment
# stays dim so it doesn't compete.
set -g pane-border-status top
set -g pane-border-format "#{pane_title} #[fg=#607090]· #{pane_current_command} #[fg=#1a0033]·#[fg=#607090] #{?pane_active,active,idle} "

# Notifications and the command prompt — teal on black
set -g message-style         "bg=#0a0014,fg=#00FFCC,bold"
set -g message-command-style "bg=#0a0014,fg=#FF00AA,bold"

# Copy / selection mode — magenta highlight on dark grey
setw -g mode-style "bg=#1a0033,fg=#D946EF,bold"

# Clock mode (prefix t) — match the cyan accent
setw -g clock-mode-colour "#00FFCC"
setw -g clock-mode-style 24

# ------------------------------------------------------------------------
# Operator quality-of-life
# ------------------------------------------------------------------------

# Mouse — click-to-focus, drag-resize, scroll
set -g mouse on

# Easy splits with visual key cues, preserving cwd of focused pane
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Sane defaults
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10

# Reload config in-place
bind r source-file ~/.tmux.conf \; display-message "multideck conf reloaded"

# ------------------------------------------------------------------------
# Extra global hotkeys (no prefix needed)
# ------------------------------------------------------------------------

# Ctrl+Shift+T — pop up a team-preset picker (Build Team, Investigation,
# Full Roster, etc. from dashboard/team-presets.json). Pick by letter,
# whole team spawns into the multideck session.
bind-key -n C-S-t run-shell "/mnt/f/03-INFRASTRUCTURE/dispatch-framework/scripts/spawn-team-menu.sh"

# Ctrl+Shift+K — kill the focused pane. Skips the prefix+x+y dance for
# fast persona dismissal. Confirms first to avoid trigger-finger losses.
bind-key -n C-S-k confirm-before -p "kill focused pane? (y/n)" kill-pane

# Alt+arrows — jump between panes without the prefix. Faster than
# prefix+o cycle when you know which direction.
bind-key -n M-Left  select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-Up    select-pane -U
bind-key -n M-Down  select-pane -D

# Alt+1..9 — quick-jump to pane by index. Faster than Alt+arrows when
# you know "Engineer is pane 3".
bind-key -n M-1 select-pane -t :.1
bind-key -n M-2 select-pane -t :.2
bind-key -n M-3 select-pane -t :.3
bind-key -n M-4 select-pane -t :.4
bind-key -n M-5 select-pane -t :.5
bind-key -n M-6 select-pane -t :.6
bind-key -n M-7 select-pane -t :.7
bind-key -n M-8 select-pane -t :.8
bind-key -n M-9 select-pane -t :.9

# Ctrl+Shift+N — floating "now playing" popup: live Kokoro queue depths,
# lock state, recent TTS output. Press any key to dismiss.
bind-key -n C-S-n display-popup -E -w 70 -h 22 -T " now playing " "/mnt/f/03-INFRASTRUCTURE/dispatch-framework/scripts/multideck-now-playing.sh"

# Ctrl+Shift+M — floating minimap: list all multideck panes with index,
# callsign, command, idle time. Press a number 1-9 to jump to that pane.
bind-key -n C-S-m display-popup -E -w 64 -h 20 -T " minimap " "/mnt/f/03-INFRASTRUCTURE/dispatch-framework/scripts/multideck-minimap.sh"

# Pane-focus-in hook — when focus moves between panes, set the active border
# color to match the focused persona's accent (extracted from pane title).
# This makes the focused pane's border instantly identify which operative
# is in front.
set-hook -g pane-focus-in 'run-shell "/mnt/f/03-INFRASTRUCTURE/dispatch-framework/scripts/multideck-active-border.sh"'

# ------------------------------------------------------------------------
# Plugins via TPM (Tmux Plugin Manager)
# Install: git clone --depth 1 https://github.com/tmux-plugins/tpm \
#            ~/.tmux/plugins/tpm
# After source: prefix + I (capital I) to install plugins
# Update:       prefix + U
# Uninstall:    prefix + alt + u
# ------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-continuum: auto-save the multideck session every 15 min and auto-
# restore on tmux server start (e.g. after reboot, WSL restart).
set -g @continuum-restore        'on'
set -g @continuum-save-interval  '15'

# tmux-resurrect: also restore running programs (claude, etc.) inside
# the panes — not just the layout. Optional; disable if it causes issues
# by setting to 'off'.
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes              'claude python3 node bash'

# Initialize TPM (must be the absolute LAST line in this file)
run '~/.tmux/plugins/tpm/tpm'
