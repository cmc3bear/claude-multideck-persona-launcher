  <!--
    MULTI-FEAT-0067 wiring notes:
    - data/jobs.js + data/lessons.js define MOCK fixtures and the always-on
      helpers (TENETS, computeTenetCounts, matchLessonsToJob, validation
      registry). They are loaded before live.js so the helpers exist in
      both modes; live.js then replaces window.JOBS / window.LESSONS /
      window.PROJECTS / window.PERSONAS when mdk-data-mode=live.
    - In live mode, sample data must NOT silently substitute on fetch
      failure — see live.js applyMock() guarded by failHard policy.
    - lessons-validate.js implements the §2 schema rules per
      docs/REVIEWER_LOG.md and is reachable from the editor in
      scripts/lessons.js (which already calls validateLesson()).
  -->
  <script src="/data/jobs.js?v=5"></script>
  <script src="/data/lessons.js?v=3"></script>
  <script src="/scripts/lessons-validate.js?v=1"></script>
